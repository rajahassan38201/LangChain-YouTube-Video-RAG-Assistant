<!DOCTYPE html> 
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube RAG Assistant</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #progress-bar {
            transition: width 0.3s ease;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col overflow-hidden relative">

    <div
        class="w-full flex justify-between items-center px-6 py-4 bg-white/80 backdrop-blur-md border-b absolute top-0 z-20">
        <div class="font-bold text-xl flex items-center gap-2 text-gray-800">
            <svg class="text-[#FF0000] w-8 h-8" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M9.996,15.5v-7l6.5,3.5L9.996,15.5z" />
            </svg>
            YT Assistant
        </div>
        <div class="flex items-center gap-2">
            <button onclick="exportChat()" id="export-btn"
                class="hidden text-sm font-semibold text-gray-600 bg-white border hover:bg-gray-50 px-4 py-2 rounded-full shadow-sm transition flex items-center gap-2">
                <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z" />
                    <path
                        d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z" />
                </svg>
                Export
            </button>
            <button onclick="goBack()"
                class="text-sm font-semibold text-gray-600 bg-white border hover:bg-gray-50 px-4 py-2 rounded-full shadow-sm transition flex items-center gap-2">
                <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M8 0a1 1 0 0 1 1 1v6h6a1 1 0 1 1 0 2H9v6a1 1 0 1 1-2 0V9H1a1 1 0 0 1 0-2h6V1a1 1 0 0 1 1-1z" />
                </svg>
                New Chat
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto w-full relative scroll-smooth pt-20" id="scroll-area">

        <div id="setup-section" class="absolute inset-0 flex items-center justify-center p-4">
            <div
                class="w-full max-w-md fade-in text-center bg-white p-8 rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-gray-100">
                <div class="text-[#FF0000] w-16 h-16 mx-auto flex items-center justify-center mb-4 drop-shadow-md">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-full h-full">
                        <path
                            d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M9.996,15.5v-7l6.5,3.5L9.996,15.5z" />
                    </svg>
                </div>

                <h1 class="text-2xl font-extrabold mb-2 text-gray-800">Analyze any video</h1>
                <p class="text-gray-500 mb-6 text-sm">Paste a YouTube link to start chatting.</p>

                <div class="space-y-4 text-left">
                    <input type="text" id="youtube-url" placeholder="https://youtube.com/watch?v=..."
                        class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition bg-gray-50 hover:bg-white focus:bg-white">
                    <select id="language"
                        class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition bg-gray-50 hover:bg-white focus:bg-white text-gray-700">
                        <option value="en">English Transcript</option>
                        <option value="hi">Hindi Transcript</option>
                    </select>
                    <button onclick="processVideo()" id="process-btn"
                        class="w-full bg-[#FF0000] text-white font-semibold py-3.5 rounded-xl hover:bg-red-700 transition shadow-md flex justify-center items-center gap-2">
                        Start Chatting
                    </button>

                    <div id="progress-container"
                        class="hidden w-full bg-gray-100 rounded-full h-1.5 mt-4 overflow-hidden">
                        <div id="progress-bar" class="bg-[#FF0000] h-1.5 rounded-full" style="width: 0%"></div>
                    </div>
                    <p id="setup-status" class="text-sm text-center hidden mt-2 font-medium"></p>
                </div>
            </div>
        </div>

        <div id="chat-section" class="hidden w-full max-w-3xl mx-auto p-4 pb-40 space-y-8 flex flex-col mt-4"></div>
    </div>

    <div id="input-container"
        class="hidden absolute bottom-0 left-0 right-0 bg-gradient-to-t from-gray-50 via-gray-50 to-transparent pt-10 pb-6 px-4 z-10">
        <div
            class="max-w-3xl mx-auto relative flex items-end shadow-lg border border-gray-200 rounded-3xl bg-white overflow-hidden transition-all focus-within:ring-2 focus-within:ring-gray-200">
            <textarea id="question" rows="1" placeholder="Ask about the video..."
                class="w-full max-h-32 p-4 bg-transparent outline-none resize-none overflow-y-auto text-gray-800"
                oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
            <button onclick="askQuestion()" id="ask-btn"
                class="p-2.5 m-2 bg-gray-800 text-white rounded-full hover:bg-gray-900 transition disabled:opacity-50 flex-shrink-0">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            </button>
        </div>
        <div class="text-xs text-center text-gray-400 mt-3 font-medium">AI can make mistakes. Verify important
            information.</div>
    </div>

    <script>
        const API_URL = "http://localhost:8000";
        let progressInterval;
        let chatHistory = [];

        document.getElementById("question").addEventListener("keydown", function (event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                askQuestion();
            }
        });

        async function processVideo() {
            const url = document.getElementById("youtube-url").value;
            const language = document.getElementById("language").value;
            const btn = document.getElementById("process-btn");
            const status = document.getElementById("setup-status");
            const progressContainer = document.getElementById("progress-container");
            const progressBar = document.getElementById("progress-bar");

            if (!url) return alert("Please enter a YouTube URL.");

            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...`;
            btn.disabled = true;
            status.classList.remove("hidden", "text-red-500", "text-green-500");
            status.classList.add("text-gray-500");
            status.innerText = "Reading transcript...";
            progressContainer.classList.remove("hidden");
            progressBar.style.width = "0%";
            progressBar.classList.replace("bg-red-500", "bg-[#FF0000]");

            let width = 0;
            progressInterval = setInterval(() => {
                if (width >= 90) clearInterval(progressInterval);
                else {
                    width += Math.random() * 15;
                    progressBar.style.width = Math.min(width, 90) + "%";
                }
            }, 400);

            try {
                const res = await fetch(`${API_URL}/process`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url, language })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Failed to process video");

                clearInterval(progressInterval);
                progressBar.style.width = "100%";
                status.innerText = "Ready!";

                setTimeout(() => {
                    document.getElementById("setup-section").classList.add("hidden");
                    document.getElementById("chat-section").classList.remove("hidden");
                    document.getElementById("input-container").classList.remove("hidden");
                    document.getElementById("export-btn").classList.remove("hidden"); // Show Export button
                }, 400);

            } catch (error) {
                clearInterval(progressInterval);
                progressBar.classList.replace("bg-[#FF0000]", "bg-red-500");
                status.innerText = error.message;
                status.classList.replace("text-gray-500", "text-red-500");
            } finally {
                btn.innerHTML = "Start Chatting";
                btn.disabled = false;
            }
        }

        function goBack() {
            document.getElementById("chat-section").classList.add("hidden");
            document.getElementById("input-container").classList.add("hidden");
            document.getElementById("export-btn").classList.add("hidden"); // Hide Export button
            document.getElementById("setup-section").classList.remove("hidden");
            document.getElementById("youtube-url").value = "";
            document.getElementById("progress-container").classList.add("hidden");
            document.getElementById("setup-status").classList.add("hidden");
            document.getElementById("chat-section").innerHTML = "";
            chatHistory = [];
        }

        // Export Chat Functionality
        function exportChat() {
            if (chatHistory.length === 0) {
                alert("The chat is currently empty.");
                return;
            }

            let textContent = "--- YouTube Video Assistant Chat ---\n\n";
            chatHistory.forEach(msg => {
                textContent += `[${msg.role}]\n${msg.content}\n\n`;
            });

            // Create a Blob containing the text data
            const blob = new Blob([textContent], { type: "text/plain" });
            const url = URL.createObjectURL(blob);

            // Create a temporary anchor element to trigger the download
            const a = document.createElement("a");
            a.href = url;
            a.download = `YouTube_Assistant_Chat_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();

            // Cleanup
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function askQuestion() {
            const questionInput = document.getElementById("question");
            const question = questionInput.value.trim();
            const chatBox = document.getElementById("chat-section");
            const scrollArea = document.getElementById("scroll-area");
            const btn = document.getElementById("ask-btn");

            if (!question) return;

            chatBox.innerHTML += `<div class="flex justify-end w-full fade-in"><div class="bg-gray-100 border text-gray-800 px-5 py-3 rounded-3xl rounded-tr-sm max-w-[80%] whitespace-pre-wrap shadow-sm">${question}</div></div>`;

            questionInput.value = "";
            questionInput.style.height = '';
            scrollArea.scrollTop = scrollArea.scrollHeight;
            btn.disabled = true;

            const responseId = "msg-" + Date.now();

            chatBox.innerHTML += `
                <div class="flex justify-start w-full fade-in">
                    <div class="flex-shrink-0 mr-4 mt-1">
                        <div class="bg-[#FF0000] text-white w-8 h-8 rounded-full flex items-center justify-center shadow-md">
                            <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M9.996,15.5v-7l6.5,3.5L9.996,15.5z"/></svg>
                        </div>
                    </div>
                    <div id="${responseId}" class="prose prose-red max-w-[85%] text-gray-800"></div>
                </div>`;

            const responseContainer = document.getElementById(responseId);
            let fullResponse = "";

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question, history: chatHistory })
                });

                if (!res.ok) throw new Error("Server error");

                const reader = res.body.getReader();
                const decoder = new TextDecoder("utf-8");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    fullResponse += decoder.decode(value, { stream: true });
                    responseContainer.innerHTML = marked.parse(fullResponse);
                    scrollArea.scrollTop = scrollArea.scrollHeight;
                }

                chatHistory.push({ role: "User", content: question });
                chatHistory.push({ role: "Assistant", content: fullResponse });

            } catch (error) {
                responseContainer.innerHTML = `<span class="text-red-500 font-semibold">Error connecting to server.</span>`;
            } finally {
                btn.disabled = false;
                scrollArea.scrollTop = scrollArea.scrollHeight;
            }
        }
    </script>
</body>

</html>
